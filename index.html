<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CUTE GUYS VIP</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
body { background: #0a0a0a; color: #fff; font-family: Arial; margin: 0; padding: 15px; }
.title { text-align: center; font-size: 26px; font-weight: bold; background: linear-gradient(90deg, #FFD700, #FF00FF); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
.free-groups { background: #1a1a1a; border: 2px solid #FFD700; border-radius: 12px; padding: 15px; margin: 15px 0; text-align: center; }
.free-groups a { color: #00FF88; text-decoration: none; font-weight: bold; display: block; margin: 5px 0; font-size: 16px; }
.section { margin: 20px 0; }
.section-title { color: #FFD700; font-size: 18px; font-weight: bold; margin-bottom: 10px; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.item { background: #1a1a1a; border: 2px solid #333; border-radius: 10px; padding: 12px; text-align: center; cursor: pointer; transition: 0.2s; }
.item.selected { border: 2px solid #FF00FF; background: #2a0a2a; transform: scale(1.03); }
.item .price { color: #00FF88; font-weight: bold; font-size: 14px; }
.pay-btn { width: 100%; padding: 15px; margin: 8px 0; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; }
.paypal { background: #0070BA; color: white; } .crypto { background: #0088cc; color: white; } .stars { background: #FFD700; color: black; } .stripe { background: #635BFF; color: white; }
</style>
</head>
<body>
<div class="title">CUTE GUYS VIP 👑</div>

<div class="free-groups">
<b>🎁 GRUPOS GRATIS</b>
<a href="https://telegram.me/+CET3NNTylb8xOTYx" target="_blank">GRUPO VIP GRATIS 1</a>
<a href="https://telegram.me/+Z2EbBhJGY8UwYjlh" target="_blank">GRUPO VIP GRATIS 2</a>
</div>

<div class="section">
<div class="section-title">PAQUETES MENSUALES</div>
<div class="grid">
<div class="item" data-id="1mes"><b>1 Mes</b><div class="price">$5 / 500⭐</div></div>
<div class="item" data-id="2meses"><b>2 Meses</b><div class="price">$9 / 900⭐</div></div>
<div class="item" data-id="3meses"><b>3 Meses</b><div class="price">$12 / 1200⭐</div></div>
<div class="item" data-id="6meses"><b>6 Meses</b><div class="price">$20 / 2000⭐</div></div>
</div>
</div>

<div class="section">
<div class="section-title">SUSCRIPCIONES</div>
<div class="grid">
<div class="item" data-id="anual"><b>Anual</b><div class="price">$35 / 3500⭐</div></div>
<div class="item" data-id="perma"><b>Permanente</b><div class="price">$60 / 6000⭐</div></div>
</div>
</div>

<button class="pay-btn paypal" onclick="pagar('Paypal')">Pagar con Paypal</button>
<button class="pay-btn crypto" onclick="pagar('CryptoBot')">Pagar con CryptoBot</button>
<button class="pay-btn stars" onclick="pagar('Stars')">Pagar con Stars</button>
<button class="pay-btn stripe" onclick="pagar('Stripe')">Pagar con Stripe</button>

<script>
let selected = null;
const tg = window.Telegram.WebApp;
tg.expand();

document.querySelectorAll('.item').forEach(item => {
item.onclick = () => {
document.querySelectorAll('.item').forEach(i => i.classList.remove('selected'));
item.classList.add('selected');
selected = item.dataset.id;
}
});

function pagar(metodo) {
if(!selected) { alert('Primero selecciona un plan rey 👑'); return; }
tg.sendData(JSON.stringify({plan_id: selected, metodo: metodo}));
tg.close();
}
</script>
</body>
</html>
