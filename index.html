<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CUTE GUYS SUBSCRIPTIONS</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; }
body { background: linear-gradient(135deg, #0a0a0a 0%, #1a1200 50%, #0a0a0a 100%); color: #fff; font-family: 'Montserrat', Arial; margin: 0; padding: 20px; }
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
.title { font-size: 28px; font-weight: 800; background: linear-gradient(90deg, #FFD700, #FFF); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.lang-btn { background: #000; border: 2px solid #FFD700; border-radius: 50%; width: 45px; height: 45px; font-size: 26px; cursor: pointer; }
.free-groups { background: #000; border: 2px solid #FFD700; border-radius: 16px; padding: 18px; margin: 20px 0; text-align: center; }
.free-groups b { color: #FFD700; font-size: 18px; display: block; margin-bottom: 10px; }
.free-groups a { color: #FFF; text-decoration: none; font-weight: 600; display: block; margin: 10px 0; font-size: 15px; }
.section-title { color: #FFD700; font-size: 20px; font-weight: 800; margin: 25px 0 15px 0; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
.item { background: #000; border: 2px solid #333; border-radius: 14px; padding: 16px; text-align: center; cursor: pointer; transition: 0.3s; }
.item.selected { border: 2px solid #FFD700; background: #1a1200; box-shadow: 0 0 25px rgba(255,215,0,0.4); }
.item.name { font-weight: 800; font-size: 15px; color: #FFF; margin-bottom: 6px; }
.item.price { color: #FFD700; font-weight: 600; font-size: 14px; }
.duracion { display: flex; gap: 12px; margin: 20px 0 30px 0; }
.dur-btn { flex: 1; background: #000; border: 2px solid #333; color: #FFF; padding: 14px; border-radius: 12px; font-weight: 700; cursor: pointer; font-size: 14px; }
.dur-btn.selected { border-color: #FFD700; background: #1a1200; color: #FFD700; }
.pay-main { width: 100%; padding: 16px; margin: 15px 0; border: 2px solid #FFD700; border-radius: 14px; font-size: 17px; font-weight: 800; cursor: pointer; background: linear-gradient(90deg, #FFD700, #FFF); color: #000; }
.modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 100; }
.modal-content { background: #000; border: 2px solid #FFD700; border-radius: 18px; padding: 22px; margin: 5% 15px; max-height: 90vh; overflow-y: auto; }
.back-btn { background: none; border: none; color: #FFD700; font-size: 22px; cursor: pointer; font-weight: 700; }
.resumen { background: #1a1200; border: 1px solid #FFD700; border-radius: 12px; padding: 16px; margin: 18px 0; font-size: 14px; }

/* RULETA ESTRELLA CON BORDES */
.ruleta-container { position: relative; width: 210px; height: 210px; margin: 20px auto; }
.ruleta { width: 100%; height: 100%; position: relative; transition: transform 3s cubic-bezier(0.17, 0.67, 0.12, 1); }
.ruleta-section {
    position: absolute;
    width: 50%;
    height: 50%;
    transform-origin: 100% 100%;
    clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding-top: 25px;
    font-weight: 800;
    color: #000;
    font-size: 19px;
    text-shadow: 1px 1px 2px rgba(255,255,255,0.5);
    border: 2px solid #000; /* BORDE NEGRO */
}
.pointer { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 16px solid transparent; border-right: 16px solid transparent; border-top: 25px solid #FFD700; z-index: 10; filter: drop-shadow(0 0 5px #FFD700); }
.ruleta-btn { width: 100%; padding: 14px; background: #FFD700; color: #000; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; margin: 10px 0; font-size: 15px; }
.ruleta-btn:disabled { background: #444; color: #888; cursor: not-allowed; }
</style>
</head>
<body>
<div class="header">
<div class="title">CUTE GUYS VIP 👑</div>
<button class="lang-btn" onclick="cambiarIdioma()">🇪🇸</button>
</div>

<div class="free-groups">
<b>🎁 GRUPOS GRATIS</b>
<a href="https://t.me/+Z2EbBhJGY8UwYjlh" target="_blank">𝘾𝙪𝙩𝙚 𝙂𝙪𝙮𝙨 🔥</a>
<a href="https://t.me/+CET3NNTylb8xOTYx" target="_blank">𝘾𝙪𝙩𝙚 𝙂𝙪𝙮𝙨 𝘾𝙝𝙖𝙣𝙣𝙚𝙡🔥</a>
</div>

<div class="section-title">📦 ELIGE TU VIP</div>
<div class="grid" id="vips"></div>

<div class="section-title">⏰ ELIGE DURACIÓN</div>
<div class="duracion">
<button class="dur-btn" data-dias="30" data-extra="30">1 Mes<br>+$30</button>
<button class="dur-btn" data-dias="365" data-extra="50">1 Año<br>+$50</button>
<button class="dur-btn" data-dias="9999" data-extra="100">♾️ Permanente<br>+$100</button>
</div>

<button class="pay-main" onclick="mostrarPago()">🚀 PAGAR AHORA</button>

<!-- MODAL 1: RULETA -->
<div class="modal" id="modalPago">
<div class="modal-content">
<button class="back-btn" onclick="cerrarPago()">← Volver</button>
<h2 style="color:#FFD700; text-align:center;">Elige método de pago</h2>
<div class="resumen" id="resumen"></div>
<div class="ruleta-container">
<div class="pointer"></div>
<div class="ruleta" id="ruleta"></div>
</div>
<button class="ruleta-btn" id="btnRuleta" onclick="girarRuleta()">🎰 GIRAR RULETA -5% a 15%</button>
<button class="pay-main" onclick="mostrarMetodosPago()">💳 PAGAR AHORA</button>
</div>
</div>

<!-- MODAL 2: MÉTODOS DE PAGO -->
<div class="modal" id="modalMetodos">
<div class="modal-content">
<button class="back-btn" onclick="volverARuleta()">← Volver</button>
<h2 style="color:#FFD700; text-align:center;">Completa tu pago</h2>
<div class="resumen" id="resumen2"></div>
<button class="pay-main" style="background:#000; color:#FFD700;" onclick="pagar('Paypal')">💰 Paypal</button>
<button class="pay-main" style="background:#000; color:#FFD700;" onclick="pagar('CryptoBot')">₿ CryptoBot</button>
<button class="pay-main" style="background:#000; color:#FFD700;" onclick="pagar('Stars')">⭐ Stars</button>
<button class="pay-main" style="background:#000; color:#FFD700;" onclick="pagar('Stripe')">💳 Stripe Tarjeta</button>
<p style="color:#FFD700; text-align:center; font-size:13px;">⚡ Entrega inmediata después del pago</p>
</div>
</div>

<script>
let vipSel = null, durSel = null, idioma = 0, descuento = 0, ruletaUsada = false;
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();
alert("WebApp OK: " + tg.platform);
const banderas = ['🇪🇸','🇺🇸','🇧🇷','🇷🇺'];

const VIP = {
"prohibido": {n:["Prohibido","Forbidden","Proibido","Запрещено"], usd:15, stars:800},
"twinks": {n:["Twinks","Twinks","Twinks","Твинки"], usd:15, stars:800},
"adultos": {n:["Adultos","Adults","Adultos","Взрослые"], usd:10, stars:500},
"personalizado": {n:["Personalizado","Custom","Personalizado","Индивидуальный"], usd:70, stars:3500},
"twinks_prohibido": {n:["Twinks + Prohibido","Twinks + Forbidden","Twinks + Proibido","Твинки + Запрещено"], usd:27, stars:1600},
"twinks_adultos": {n:["Twinks + Adultos","Twinks + Adults","Twinks + Adultos","Твинки + Взрослые"], usd:17, stars:1100},
"prohibido_adultos": {n:["Prohibido + Adultos","Forbidden + Adults","Proibido + Adultos","Запрещено + Взрослые"], usd:15, stars:1100},
"personalizado_otro": {n:["Personalizado + Otro","Custom + Other","Personalizado + Outro","Индив + Другой"], usd:80, stars:3800},
"todos": {n:["Todos 🔥","All 🔥","Todos 🔥","Все 🔥"], usd:100, stars:4800}
};

const PORCENTAJES = [5,5,8,8,10,10,12,15]; // 8 secciones con % bajos
const COLORES = ['#FFD700','#FFF','#FFD700','#FFF','#FFD700','#FFF','#FFD700','#FFF'];

function crearRuleta() {
    const ruleta = document.getElementById('ruleta');
    ruleta.innerHTML = '';
    const angulo = 360 / PORCENTAJES.length;
    PORCENTAJES.forEach((p, i) => {
        const div = document.createElement('div');
        div.className = 'ruleta-section';
        div.style.background = COLORES[i];
        div.style.transform = `rotate(${i * angulo}deg)`;
        div.innerHTML = `<span style="transform: rotate(${-i * angulo}deg);">${p}%</span>`;
        ruleta.appendChild(div);
    });
}

function renderVips() {
    const contenedor = document.getElementById('vips');
    contenedor.innerHTML = '';
    for(let k in VIP) {
        const div = document.createElement('div');
        div.className = 'item';
        div.dataset.id = k;
        div.innerHTML = `<div class="name">${VIP[k].n[idioma]}</div><div class="price">$${VIP[k].usd} / ${VIP[k].stars}⭐</div>`;
        div.onclick = function() {
            document.querySelectorAll('.item').forEach(x=>x.classList.remove('selected'));
            this.classList.add('selected');
            vipSel = this.dataset.id;
        };
        contenedor.appendChild(div);
    }
    document.querySelectorAll('.dur-btn').forEach(b => {
        b.onclick = function() {
            document.querySelectorAll('.dur-btn').forEach(x=>x.classList.remove('selected'));
            this.classList.add('selected');
            durSel = this.dataset;
        };
    });
}

function cambiarIdioma() {
    idioma = (idioma+1)%4;
    document.querySelector('.lang-btn').innerText = banderas[idioma];
    renderVips();
}

function calcularTotal() {
    let v = VIP[vipSel];
    let extra = parseInt(durSel.extra);
    let totalUsd = v.usd + extra;
    let totalStars = v.stars + (extra*10);
    if(descuento > 0) {
        let descUsd = Math.floor(totalUsd * descuento / 100);
        let descStars = Math.floor(totalStars * descuento / 100);
        totalUsd -= descUsd;
        totalStars -= descStars;
        return {totalUsd, totalStars, descUsd, descStars}
    }
    return {totalUsd, totalStars, descUsd:0, descStars:0}
}

function mostrarPago() {
    if(!vipSel ||!durSel) { alert('Elige VIP y duración rey 👑'); return; }
    if(ruletaUsada) {
        document.getElementById('btnRuleta').disabled = true;
        document.getElementById('btnRuleta').innerText = `✅ Ya usaste ${descuento}%`;
    } else {
        document.getElementById('btnRuleta').disabled = false;
        document.getElementById('btnRuleta').innerText = '🎰 GIRAR RULETA -5% a 15%';
    }
    crearRuleta();
    actualizarResumen();
    document.getElementById('modalPago').style.display='block';
}

function actualizarResumen() {
    let v = VIP[vipSel];
    let t = calcularTotal();
    let durText = durSel.dias=="9999"? '♾️ Permanente' : durSel.dias+' días';
    let html = `
    <b>Plan:</b> ${v.n[idioma]}<br>
    <b>Duración:</b> ${durText}<br>
    <b>Subtotal:</b> $${v.usd + parseInt(durSel.extra)} / ${v.stars + parseInt(durSel.extra)*10}⭐<br>
    ${descuento>0? `<b>Descuento:</b> -${descuento}% = -$${t.descUsd} / -${t.descStars}⭐<br>` : ''}
    <b style="color:#FFD700;">TOTAL:</b> $${t.totalUsd} / ${t.totalStars}⭐
    `;
    document.getElementById('resumen').innerHTML = html;
    document.getElementById('resumen2').innerHTML = html;
}

function cerrarPago() {
    document.getElementById('modalPago').style.display='none';
}

function volverARuleta() {
    document.getElementById('modalMetodos').style.display='none';
    document.getElementById('modalPago').style.display='block';
}

function mostrarMetodosPago() {
    document.getElementById('modalPago').style.display='none';
    actualizarResumen();
    document.getElementById('modalMetodos').style.display='block';
}

function girarRuleta() {
    if(ruletaUsada) return;
    ruletaUsada = true;
    document.getElementById('btnRuleta').disabled = true;
    let idx = Math.floor(Math.random()*PORCENTAJES.length);
    descuento = PORCENTAJES[idx];
    let angulo = 360*4 + (idx * (360/PORCENTAJES.length)) + 22.5;
    document.getElementById('ruleta').style.transform = `rotate(${angulo}deg)`;
    setTimeout(()=>{
        actualizarResumen();
        document.getElementById('btnRuleta').innerText = `✅ Ganaste ${descuento}%`;
        alert(`🎉 Ganaste ${descuento}% de descuento!`);
    }, 3000);
}

function pagar(metodo) {
    let v = VIP[vipSel];
    let t = calcularTotal();

    const data = {
        plan_id: vipSel,
        dias: durSel.dias,
        total_usd: t.totalUsd,
        total_stars: t.totalStars,
        descuento: descuento,
        metodo: metodo
    };

    console.log("Enviando:", data); // para debug

    
    tg.sendData(JSON.stringify(data));

    setTimeout(() => {
        tg.close(); // dale 200ms para que envíe antes de cerrar
    }, 200);
}

window.onload = renderVips;
</script>
</body>
    </html>
